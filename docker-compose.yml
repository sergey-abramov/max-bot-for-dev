version: '3.8'

# Legacy local runtime only.
# Production deployment path is Vercel Serverless + webhook.
services:
  bot:
    build: .
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - QUIZ_API_URL=${QUIZ_API_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - STT_API_URL=http://stt:8000/transcribe
    env_file:
      - .env
    depends_on:
      - db
      - quiz-api
  stt:
    build: ./stt-service
    restart: unless-stopped

  quiz-api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "pip install --no-cache-dir
      'fastapi[standard]'
      'sqlalchemy>=2.0'
      'psycopg[binary]'
      'httpx>=0.27'
      && uvicorn services.quiz_api:app --host 0.0.0.0 --port 8001"
    environment:
      - DATABASE_URL=${DATABASE_FOR_QUIZ}
    depends_on:
      - db

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: