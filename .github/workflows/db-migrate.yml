name: DB Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "alembic/**"
      - "db/**"
      - "services/**"
      - "pyproject.toml"
      - "alembic.ini"
      - ".github/workflows/db-migrate.yml"

jobs:
  migrate:
    runs-on: ubuntu-latest
    # Нужно, если DATABASE_URL хранится в Settings → Environments → <имя> → Environment secrets.
    # Имя должно совпадать с окружением в GitHub (часто production). Иначе secrets из окружения недоступны.
    environment: production
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate DATABASE_URL is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not set"
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Show current revision
        run: alembic current
